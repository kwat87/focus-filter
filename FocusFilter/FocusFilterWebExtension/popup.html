<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><link rel="stylesheet" href="popup.css"><title>FocusFilter</title></head>
<body>
<div class="container">
  <div class="header"><div class="icon">&#128683;</div><h1>FocusFilter</h1><p class="subtitle">Short-form video blocker</p></div>
  <div class="status active"><span class="status-dot"></span>Content blocker is active</div>
  <ul class="blocked-list">
    <li><span class="badge yt">YT</span>YouTube Shorts</li>
    <li><span class="badge ig">IG</span>Instagram Reels</li>
    <li><span class="badge fb">FB</span>Facebook Reels &amp; Watch</li>
    <li><span class="badge tt">TT</span>TikTok</li>
  </ul>
  <p class="footer">Blocking is always on while the extension is enabled.</p>
</div>
</body></html>
